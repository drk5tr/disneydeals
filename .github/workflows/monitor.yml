name: disney-offers-monitor

on:
  schedule:
    - cron: "0 2,14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: disney-offers-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps firefox
      - name: Run monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          MONITOR_WINDOW_START: ${{ vars.MONITOR_WINDOW_START }}
          MONITOR_WINDOW_END: ${{ vars.MONITOR_WINDOW_END }}
          MONITOR_YEAR: ${{ vars.MONITOR_YEAR }}
          MONITOR_EXCLUDE: ${{ vars.MONITOR_EXCLUDE }}
        run: python disney_offers_monitor.py
      - name: Persist state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "update offer state [skip ci]"
            git push
          fi
